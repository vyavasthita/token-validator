[project]
name = "jwt-lib"
version = "0.1.0"
description = "Lib to validate JWT token"
authors = [
    {name = "Dilip Sharma",email = "diliplakshya@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyjwt (>=2.11.0,<3.0.0)",
    "cryptography (>=46.0.5)"
]


[project.optional-dependencies]
test = [
    "pytest (>=8.0.0)",
    "pytest-asyncio (>=0.24.0)",
    "pytest-cov (>=4.1.0)",
    "pytest-httpserver (>=1.0.10)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
