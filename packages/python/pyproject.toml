[project]
name = "jwt-lib"
version = "0.1.0"
description = "Lib to validate JWT token"
authors = [
    {name = "Dilip Sharma",email = "diliplakshya@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyjwt (>=2.11.0,<3.0.0)",
    "pytest (>=9.0.2,<10.0.0)",
    "pytest-asyncio (>=1.3.0,<2.0.0)",
    "cryptography (>=43.0.0,<44.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
